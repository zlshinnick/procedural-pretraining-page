<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <rect width="200" height="140" rx="8" fill="#fef7ee"/>
  <!-- Grid of cells representing cellular automaton evolution -->
  <g transform="translate(30, 12)">
    <!-- Row 0 -->
    <rect x="60" y="0" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="0" y="0" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="15" y="0" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="30" y="0" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="45" y="0" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="75" y="0" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="90" y="0" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="105" y="0" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="120" y="0" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <!-- Row 1 -->
    <rect x="45" y="15" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="60" y="15" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="0" y="15" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="15" y="15" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="30" y="15" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="75" y="15" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="90" y="15" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="105" y="15" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="120" y="15" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <!-- Row 2 -->
    <rect x="30" y="30" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="45" y="30" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="60" y="30" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="75" y="30" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="0" y="30" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="15" y="30" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="90" y="30" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="105" y="30" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="120" y="30" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <!-- Row 3 -->
    <rect x="15" y="45" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="30" y="45" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="60" y="45" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="75" y="45" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="90" y="45" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="0" y="45" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="45" y="45" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="105" y="45" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="120" y="45" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <!-- Row 4 -->
    <rect x="0" y="60" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="15" y="60" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="30" y="60" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="45" y="60" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="60" y="60" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="75" y="60" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="90" y="60" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="105" y="60" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="120" y="60" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <!-- Row 5 -->
    <rect x="0" y="75" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="15" y="75" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="30" y="75" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="45" y="75" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="60" y="75" width="12" height="12" fill="#1e293b" rx="1"/>
    <rect x="75" y="75" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="90" y="75" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="105" y="75" width="12" height="12" fill="#e2e8f0" rx="1"/>
    <rect x="120" y="75" width="12" height="12" fill="#1e293b" rx="1"/>
  </g>
  <!-- Arrow showing time -->
  <line x1="12" y1="20" x2="12" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowCA)"/>
  <text x="12" y="114" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">time</text>
  <defs><marker id="arrowCA" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#94a3b8"/></marker></defs>
  <text x="100" y="132" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Deterministic state evolution</text>
</svg>
