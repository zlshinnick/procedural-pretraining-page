<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" fill="none">
  <rect width="240" height="220" rx="10" fill="#f5f7ff"/>

  <!-- k-Dyck -->
  <g transform="translate(16, 10)">
    <text x="0" y="14" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">k-Dyck</text>
    <rect x="140" y="1" width="84" height="18" rx="9" fill="#dbeafe"/>
    <text x="182" y="14" font-family="sans-serif" font-size="9" font-weight="600" fill="#2563eb" text-anchor="middle">context-free</text>

    <g transform="translate(10, 24)">
      <text x="0" y="24" font-family="monospace" font-size="30" font-weight="700" fill="#2563eb">(</text>
      <text x="30" y="24" font-family="monospace" font-size="30" font-weight="700" fill="#7c3aed">[</text>
      <text x="60" y="24" font-family="monospace" font-size="30" font-weight="700" fill="#7c3aed">]</text>
      <text x="90" y="24" font-family="monospace" font-size="30" font-weight="700" fill="#2563eb">)</text>
      <text x="120" y="24" font-family="monospace" font-size="30" font-weight="700" fill="#0891b2">&lt;</text>
      <text x="150" y="24" font-family="monospace" font-size="30" font-weight="700" fill="#0891b2">&gt;</text>
    </g>
  </g>

  <!-- k-Dyck Shuffle -->
  <g transform="translate(16, 80)">
    <text x="0" y="14" font-family="sans-serif" font-size="12" font-weight="700" fill="#7c3aed">k-Dyck Shuffle</text>
    <rect x="140" y="1" width="84" height="18" rx="9" fill="#ede9fe"/>
    <text x="182" y="14" font-family="sans-serif" font-size="8.5" font-weight="600" fill="#7c3aed" text-anchor="middle">context-sensitive</text>

    <g transform="translate(10, 24)">
      <text x="0" y="24" font-family="monospace" font-size="30" font-weight="700" fill="#2563eb">(</text>
      <text x="30" y="24" font-family="monospace" font-size="30" font-weight="700" fill="#7c3aed">[</text>
      <text x="60" y="24" font-family="monospace" font-size="30" font-weight="700" fill="#2563eb">)</text>
      <text x="90" y="24" font-family="monospace" font-size="30" font-weight="700" fill="#0891b2">&lt;</text>
      <text x="120" y="24" font-family="monospace" font-size="30" font-weight="700" fill="#7c3aed">]</text>
      <text x="150" y="24" font-family="monospace" font-size="30" font-weight="700" fill="#0891b2">&gt;</text>
    </g>
  </g>

  <!-- WW -->
  <g transform="translate(16, 150)">
    <text x="0" y="14" font-family="sans-serif" font-size="12" font-weight="700" fill="#475569">WW</text>
    <rect x="140" y="1" width="84" height="18" rx="9" fill="#f1f5f9"/>
    <text x="182" y="14" font-family="sans-serif" font-size="9" font-weight="600" fill="#475569" text-anchor="middle">regular</text>

    <g transform="translate(10, 24)">
      <text x="0" y="22" font-family="monospace" font-size="26" font-weight="700" fill="#475569">a</text>
      <text x="26" y="22" font-family="monospace" font-size="26" font-weight="700" fill="#475569">b</text>
      <text x="52" y="22" font-family="monospace" font-size="26" font-weight="700" fill="#475569">c</text>
      <text x="78" y="22" font-family="monospace" font-size="26" font-weight="300" fill="#c0c8d4">|</text>
      <text x="96" y="22" font-family="monospace" font-size="26" font-weight="700" fill="#475569">a</text>
      <text x="122" y="22" font-family="monospace" font-size="26" font-weight="700" fill="#475569">b</text>
      <text x="148" y="22" font-family="monospace" font-size="26" font-weight="700" fill="#475569">c</text>
    </g>
  </g>
</svg>
